services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      VIRTUAL_HOST: planning.lars-rickert.de
      LETSENCRYPT_HOST: planning.lars-rickert.de
    depends_on:
      - db
    # ports:
    #   - "3000:3000"

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NUXT_POSTGRES_DB?:}
      POSTGRES_USER: ${NUXT_POSTGRES_USER?:}
      POSTGRES_HOST: ${NUXT_POSTGRES_HOST?:}
      POSTGRES_PASSWORD: ${NUXT_POSTGRES_PASSWORD?:}
    volumes:
      - .data/db:/var/lib/postgresql/18/docker
    # ports:
    #   - 5432:5432

networks:
  default:
    name: nginx-proxy
    external: true
