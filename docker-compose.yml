services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      NUXT_DB_HOST: db
      VIRTUAL_HOST: planning.lars-rickert.de
      LETSENCRYPT_HOST: planning.lars-rickert.de
    depends_on:
      db:
        condition: service_healthy
    # ports:
    #   - "3000:3000"

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NUXT_DB_NAME?:}
      POSTGRES_USER: ${NUXT_DB_USER?:}
      POSTGRES_HOST: ${NUXT_DB_HOST?:}
      POSTGRES_PASSWORD: ${NUXT_DB_PASSWORD?:}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NUXT_DB_USER?:} -d ${NUXT_DB_NAME?:}"]
      interval: 3s
      timeout: 3s
      retries: 5
    volumes:
      - .data/db:/var/lib/postgresql/18/docker
    # ports:
    #   - 5432:5432

networks:
  default:
    name: nginx-proxy
    external: true
